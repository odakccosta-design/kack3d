<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cubo Mágico Kack 3D</title>
<meta name="theme-color" content="#7c3aed">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kack 3D">
<link rel="apple-touch-icon" id="pwa-icon" href="">
<link rel="icon" type="image/jpeg" id="pwa-favicon" href="">
<style>
:root{--cubie-size:50px;--c-front:#e63946;--c-back:#f4a261;--c-right:#2196f3;--c-left:#43a047;--c-up:#fdd835;--c-down:#ffffff;--m-front:#aaa;--m-back:#888;--m-right:#bbb;--m-left:#999;--m-up:#ccc;--m-down:#666;}
*{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:linear-gradient(135deg,#f8f0ff 0%,#e8f4ff 40%,#fff8e8 100%);color:#222;font-family:'Segoe UI',sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column;}
header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.75);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(180,140,255,0.25);z-index:10;flex-shrink:0;}
.logo{font-size:1.1rem;font-weight:900;background:linear-gradient(90deg,#7c3aed,#2196f3,#e63946);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.04em;}
#level-indicator{font-size:.82rem;color:#7c3aed;font-weight:700;background:rgba(124,58,237,.1);padding:4px 10px;border-radius:20px;}
#timer-wrap{background:rgba(255,255,255,.78);backdrop-filter:blur(8px);border-bottom:1px solid rgba(0,0,0,.07);padding:6px 14px;display:none;flex-shrink:0;align-items:center;gap:10px;}
#timer-label{font-size:.72rem;color:#888;min-width:52px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
#timer-display{font-size:1.05rem;font-weight:900;color:#333;min-width:44px;}
#timer-bar-bg{flex:1;height:7px;background:#e5e7eb;border-radius:99px;overflow:hidden;}
#timer-bar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#2196f3);border-radius:99px;transition:width 1s linear,background .5s;}
.timer-warn #timer-bar-fill{background:linear-gradient(90deg,#f59e0b,#ef4444);}
.timer-warn #timer-display{color:#ef4444;}

/* MENU */
#level-menu{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#f0e6ff 0%,#e0f0ff 50%,#fff5dc 100%);z-index:200;display:flex;flex-direction:column;align-items:center;padding:18px 0 16px;overflow-y:auto;}
.menu-header{text-align:center;margin-bottom:14px;}
.menu-title{font-size:1.6rem;font-weight:900;background:linear-gradient(90deg,#7c3aed,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.04em;}
.menu-sub{font-size:.76rem;color:#999;margin-top:3px;}
.level-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding:0 14px;max-width:440px;width:100%;}
.lvl-card{background:rgba(255,255,255,.85);backdrop-filter:blur(8px);border-radius:16px;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 6px 9px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden;min-height:112px;}
.lvl-card:not(.locked):hover{transform:translateY(-3px) scale(1.03);box-shadow:0 8px 24px rgba(124,58,237,.2);border-color:#a78bfa;}
.lvl-card.completed{border-color:#f59e0b;}
.lvl-card.locked{background:rgba(240,240,245,.55);cursor:not-allowed;}
.cube-preview{margin-bottom:5px;position:relative;display:flex;align-items:center;justify-content:center;}
.cube-preview svg{display:block;}
.lvl-card.locked .cube-preview svg{opacity:.15;filter:grayscale(1);}
.lock-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);font-size:1.25rem;animation:lockBounce 2.4s ease-in-out infinite;display:none;}
.lvl-card.locked .lock-icon{display:block;}
@keyframes lockBounce{0%,100%{transform:translate(-50%,-52%) scale(1);}50%{transform:translate(-50%,-60%) scale(1.14);}}
.lvl-name{font-size:.74rem;font-weight:800;color:#333;text-align:center;line-height:1.2;}
.lvl-size{font-size:.63rem;color:#aaa;margin-top:1px;}
.lvl-times{font-size:.6rem;color:#7c3aed;margin-top:2px;font-weight:700;}
.lvl-card.locked .lvl-name,.lvl-card.locked .lvl-times,.lvl-card.locked .lvl-size{color:#ccc;}
.star-badge{position:absolute;top:5px;right:7px;font-size:.72rem;}
.lvl-card.theme-0:not(.locked){background:linear-gradient(135deg,rgba(230,57,70,.09),rgba(255,255,255,.9));}
.lvl-card.theme-1:not(.locked){background:linear-gradient(135deg,rgba(33,150,243,.09),rgba(255,255,255,.9));}
.lvl-card.theme-2:not(.locked){background:linear-gradient(135deg,rgba(67,160,71,.09),rgba(255,255,255,.9));}
.lvl-card.theme-3:not(.locked){background:linear-gradient(135deg,rgba(253,216,53,.13),rgba(255,255,255,.9));}
.lvl-card.theme-4:not(.locked){background:linear-gradient(135deg,rgba(244,114,182,.11),rgba(255,255,255,.9));}
.lvl-card.theme-5:not(.locked){background:linear-gradient(135deg,rgba(160,160,160,.1),rgba(255,255,255,.9));}
.lvl-card.theme-6:not(.locked){background:linear-gradient(135deg,rgba(251,146,60,.11),rgba(255,255,255,.9));}
.lvl-card.theme-7:not(.locked){background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(255,255,255,.9));}
.lvl-card.theme-8:not(.locked){background:linear-gradient(135deg,rgba(20,184,166,.1),rgba(255,255,255,.9));}

/* GAME SCENE */
#game-scene{flex:1;perspective:1200px;display:flex;justify-content:center;align-items:center;touch-action:none;position:relative;z-index:5;min-height:0;background:linear-gradient(135deg,#f8f0ff 0%,#e8f4ff 50%,#fff8e8 100%);}
.pivot{transform-style:preserve-3d;transform:rotateX(-30deg) rotateY(-45deg);transition:transform .08s;}
.cubie{position:absolute;width:var(--cubie-size);height:var(--cubie-size);transform-style:preserve-3d;transition:transform .22s ease-out;left:calc(var(--cubie-size)/-2);top:calc(var(--cubie-size)/-2);}
.cubie.instant{transition:none!important;}
.face{position:absolute;width:100%;height:100%;border:2px solid rgba(0,0,0,.2);border-radius:4px;backface-visibility:hidden;box-shadow:inset 0 0 8px rgba(255,255,255,.28);}
.face--front{transform:rotateY(0deg)   translateZ(calc(var(--cubie-size)/2));}
.face--back {transform:rotateY(180deg) translateZ(calc(var(--cubie-size)/2));}
.face--right{transform:rotateY(90deg)  translateZ(calc(var(--cubie-size)/2));}
.face--left {transform:rotateY(-90deg) translateZ(calc(var(--cubie-size)/2));}
.face--up   {transform:rotateX(90deg)  translateZ(calc(var(--cubie-size)/2));}
.face--down {transform:rotateX(-90deg) translateZ(calc(var(--cubie-size)/2));}
.c-mode .face--front{background:var(--c-front);}.c-mode .face--back{background:var(--c-back);}.c-mode .face--right{background:var(--c-right);}.c-mode .face--left{background:var(--c-left);}.c-mode .face--up{background:var(--c-up);}.c-mode .face--down{background:var(--c-down);}
.m-mode .face--front{background:var(--m-front);}.m-mode .face--back{background:var(--m-back);}.m-mode .face--right{background:var(--m-right);}.m-mode .face--left{background:var(--m-left);}.m-mode .face--up{background:var(--m-up);}.m-mode .face--down{background:var(--m-down);}

/* GESTOS - overlay invisível sobre cubo */
#gesture-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:20;touch-action:none;}

/* SETA DE GESTO ANIMADA */
#gesture-arrow{position:absolute;pointer-events:none;z-index:30;display:none;transition:none;}
.arrow-svg{filter:drop-shadow(0 2px 6px rgba(0,0,0,.3));}
@keyframes arrowPulse{0%{opacity:.5;transform:scale(.92);}50%{opacity:1;transform:scale(1.08);}100%{opacity:.5;transform:scale(.92);}}
.arrow-anim{animation:arrowPulse 1.1s ease-in-out infinite;}

/* CONTROLES */
.controls-wrapper{background:rgba(255,255,255,.82);backdrop-filter:blur(12px);border-top:1.5px solid rgba(180,140,255,.2);z-index:100;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-shrink:0;}
.cam-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:108px;}
.cam-btn{background:rgba(124,58,237,.08);color:#7c3aed;border:1.5px solid rgba(124,58,237,.22);height:40px;border-radius:8px;display:flex;justify-content:center;align-items:center;font-size:1rem;cursor:pointer;transition:.12s;}
.cam-btn:active{background:#7c3aed;color:#fff;transform:scale(.92);}
.action-btns{display:flex;flex-direction:column;gap:5px;align-items:center;}
.btn-round{width:42px;height:42px;border-radius:50%;border:none;font-weight:800;font-size:.62rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;box-shadow:0 3px 8px rgba(0,0,0,.13);}
.btn-round:active{transform:scale(.9);}
.btn-scramble{background:linear-gradient(135deg,#7c3aed,#2196f3);color:#fff;}
.btn-menu{background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;}
.btn-win{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;}
.btn-hint{background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;position:relative;}
.btn-hint .hint-count{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:.55rem;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;}
.btn-tut{background:linear-gradient(135deg,#06b6d4,#0284c7);color:#fff;font-size:.7rem;}
.cube-controls{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;width:138px;}
.cube-btn{background:rgba(33,150,243,.09);color:#1565c0;border:1.5px solid rgba(33,150,243,.25);height:40px;border-radius:8px;font-weight:700;font-size:.82rem;cursor:pointer;display:flex;justify-content:center;align-items:center;transition:.12s;}
.cube-btn:active{background:#2196f3;color:#fff;transform:scale(.92);}
.placeholder{height:40px;}

/* HINT PANEL */
#hint-panel{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:150;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-radius:16px;border:2px solid #f59e0b;padding:14px 18px;max-width:300px;width:90%;box-shadow:0 8px 28px rgba(245,158,11,.25);display:none;animation:hintSlide .25s ease-out;}
@keyframes hintSlide{from{opacity:0;transform:translateX(-50%) translateY(12px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
#hint-panel .hint-title{font-size:.7rem;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
#hint-panel .hint-move{font-size:1.5rem;font-weight:900;color:#333;margin-bottom:4px;}
#hint-panel .hint-desc{font-size:.78rem;color:#666;line-height:1.5;}
#hint-panel .hint-close{position:absolute;top:8px;right:10px;background:none;border:none;font-size:1rem;color:#bbb;cursor:pointer;padding:2px 6px;}
#hint-uses-msg{font-size:.65rem;color:#bbb;text-align:center;margin-top:6px;}
.hint-highlight{animation:highlightPulse 1s ease-in-out 3;}
@keyframes highlightPulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.5) drop-shadow(0 0 6px rgba(245,158,11,.8));}}

/* ===== TUTORIAL OVERLAY ===== */
#tutorial-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:none;flex-direction:column;}
.tut-backdrop{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,10,30,.82);backdrop-filter:blur(3px);}
.tut-box{position:relative;z-index:10;margin:auto;background:#fff;border-radius:20px;max-width:340px;width:92%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;}
.tut-progress{height:4px;background:#e5e7eb;}
.tut-progress-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#2196f3);transition:width .4s ease;}
.tut-header{padding:16px 18px 0;display:flex;align-items:center;gap:10px;}
.tut-step-num{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#2196f3);color:#fff;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tut-step-title{font-size:.95rem;font-weight:800;color:#222;}
.tut-visual{padding:14px 18px 4px;display:flex;justify-content:center;align-items:center;min-height:130px;position:relative;}
.tut-cube-demo{width:120px;height:100px;position:relative;}
/* mini cubo CSS 3D para demo */
.demo-pivot{width:60px;height:60px;position:relative;transform-style:preserve-3d;transform:rotateX(-25deg) rotateY(-35deg);margin:20px auto;}
.demo-face{position:absolute;width:54px;height:54px;border:2px solid rgba(0,0,0,.25);border-radius:4px;backface-visibility:hidden;}
.demo-face.df{background:#e63946;transform:translateZ(27px);}
.demo-face.db{background:#f4a261;transform:rotateY(180deg) translateZ(27px);}
.demo-face.dr{background:#2196f3;transform:rotateY(90deg) translateZ(27px);}
.demo-face.dl{background:#43a047;transform:rotateY(-90deg) translateZ(27px);}
.demo-face.du{background:#fdd835;transform:rotateX(90deg) translateZ(27px);}
.demo-face.dd{background:#fff;transform:rotateX(-90deg) translateZ(27px);}
/* seta SVG no tutorial */
.tut-arrow{position:absolute;}
@keyframes tutArrow{0%{opacity:.3;transform:translate(0,0);}50%{opacity:1;transform:translate(var(--dx),var(--dy));}100%{opacity:.3;transform:translate(0,0);}}
.tut-arrow-anim{animation:tutArrow 1.4s ease-in-out infinite;}
/* highlight de face */
.face-highlight{position:absolute;border-radius:4px;border:3px solid #fdd835;box-shadow:0 0 14px rgba(253,221,53,.8);animation:faceGlow 1.1s ease-in-out infinite;}
@keyframes faceGlow{0%,100%{box-shadow:0 0 8px rgba(253,221,53,.5);}50%{box-shadow:0 0 22px rgba(253,221,53,1);}}
.tut-desc{padding:4px 18px 12px;font-size:.82rem;color:#444;line-height:1.6;}
.tut-tip{margin:0 18px 12px;background:linear-gradient(135deg,rgba(124,58,237,.07),rgba(33,150,243,.07));border-left:3px solid #7c3aed;padding:8px 12px;border-radius:0 8px 8px 0;font-size:.76rem;color:#555;line-height:1.5;}
.tut-tip strong{color:#7c3aed;}
.tut-footer{padding:12px 18px 16px;display:flex;gap:8px;justify-content:space-between;align-items:center;border-top:1px solid #f3f4f6;}
.tut-skip{background:none;border:none;color:#bbb;font-size:.78rem;cursor:pointer;padding:4px 8px;}
.tut-skip:hover{color:#888;}
.tut-nav{display:flex;gap:8px;}
.tut-prev{background:#f3f4f6;border:none;color:#666;padding:9px 16px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;}
.tut-next{background:linear-gradient(135deg,#7c3aed,#2196f3);border:none;color:#fff;padding:9px 18px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(124,58,237,.3);}
.tut-next:active,.tut-prev:active{transform:scale(.96);}
/* dots */
.tut-dots{display:flex;gap:5px;align-items:center;}
.tut-dot{width:6px;height:6px;border-radius:50%;background:#e5e7eb;transition:.2s;}
.tut-dot.active{background:#7c3aed;width:16px;border-radius:4px;}

/* OVERLAYS WIN / TIMEOUT */
#win-overlay,#timeout-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px;padding:24px;}
#win-overlay{background:linear-gradient(160deg,rgba(220,255,225,.97),rgba(255,252,200,.97));}

/* SPLASH SCREEN */
#splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:60px;background:#1a0533;}
#splash-screen img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
#splash-loader{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;}
#splash-dots{display:flex;gap:8px;}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);animation:sdotPulse 1.2s ease-in-out infinite;}
.sdot:nth-child(2){animation-delay:.2s;}
.sdot:nth-child(3){animation-delay:.4s;}
@keyframes sdotPulse{0%,100%{background:rgba(255,255,255,.2);transform:scale(.8);}50%{background:#7c3aed;transform:scale(1.2);}}
#splash-screen.fade-out{animation:splashFade .6s ease-out forwards;}
@keyframes splashFade{to{opacity:0;pointer-events:none;}}

/* CONFETE */
#confete-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:299;}
/* RECORDE no win */
#win-record-badge{display:none;background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#7c2d12;padding:7px 18px;border-radius:20px;font-size:.82rem;font-weight:800;margin-top:-4px;}
/* RECORDE no card do menu */
.record-badge{font-size:.58rem;color:#854F0B;background:#FAEEDA;padding:2px 7px;border-radius:10px;font-weight:700;margin-top:3px;display:inline-block;}
#timeout-overlay{background:linear-gradient(160deg,rgba(255,230,220,.97),rgba(255,220,240,.97));}
#win-overlay h2{font-size:2rem;color:#16a34a;font-weight:900;}
#timeout-overlay h2{font-size:1.8rem;color:#ef4444;font-weight:900;}
.overlay-sub{color:#666;font-size:.88rem;}
.overlay-btns{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;justify-content:center;}
.ov-btn{padding:11px 24px;border-radius:10px;border:none;font-weight:700;cursor:pointer;font-size:.88rem;transition:.15s;}
.ov-btn:active{transform:scale(.95);}
.ov-next{background:linear-gradient(135deg,#7c3aed,#2196f3);color:#fff;}
.ov-retry{background:linear-gradient(135deg,#ef4444,#f59e0b);color:#fff;}
.ov-menu{background:#f3f4f6;color:#666;}
</style>
</head>
<body>

let currentLang = localStorage.getItem('kack_lang') || 'en';
function L() { return LANGS[currentLang]; }

function setLang(code) {
  currentLang = code;
  // atualiza splash se ainda visível
  const si = document.getElementById('splash-img');
  if(si && SPLASH_IMAGES && SPLASH_IMAGES[code]) si.src = SPLASH_IMAGES[code];
  localStorage.setItem('kack_lang', code);
  applyLang();
}

function applyLang() {
  const l = L();
  // Header
  const li = document.getElementById('level-indicator');
  if(li && li.textContent === LANGS['pt'].levelIndicator || li.textContent === LANGS['en'].levelIndicator || li.textContent === LANGS['es'].levelIndicator)
    li.textContent = l.levelIndicator;
  // Timer
  const tl = document.getElementById('timer-label');
  if(tl) tl.textContent = l.timerLabel;
  // Menu sub
  const ms = document.getElementById('menu-sub');
  if(ms) ms.textContent = l.menuSub;
  // Timeout overlay
  const tot = document.getElementById('timeout-title');
  if(tot) tot.textContent = l.timeoutTitle;
  const tos = document.getElementById('timeout-sub');
  if(tos) tos.textContent = l.timeoutSub;
  // Overlays
  const wo = document.querySelector('#win-overlay h2');
  if(wo) wo.textContent = l.winTitle;
  const to = document.querySelector('#timeout-overlay h2');
  if(to) to.textContent = l.timeoutTitle;
  const ts = document.querySelector('#timeout-overlay .overlay-sub');
  if(ts) ts.textContent = l.timeoutSub;
  // Buttons
  const bn = document.getElementById('btn-next');
  if(bn) bn.textContent = l.btnNext;
  const br = document.getElementById('btn-retry');
  if(br) br.textContent = l.btnRetry;
  document.querySelectorAll('.ov-menu').forEach(b => b.textContent = l.btnMenu);
  // Tutorial nav
  const tp = document.getElementById('tut-prev');
  if(tp) tp.textContent = l.tutPrev;
  // Hint
  const ht = document.querySelector('.hint-title');
  if(ht) ht.textContent = l.hintTitle;
  // Lang buttons highlight
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.style.fontWeight = b.dataset.lang === currentLang ? '900' : '500';
    b.style.opacity = b.dataset.lang === currentLang ? '1' : '0.55';
  });
  // Re-render tutorial se aberto
  if(window.tut) window.tut.render();
}

class Tutorial {
  constructor() { this.step = 0; this.steps = buildTutorialSteps(); this.total = this.steps.length; }
  show() {
    this.steps = buildTutorialSteps(); this.total = this.steps.length;
    if(window.game && window.game.timerInterval) { clearInterval(window.game.timerInterval); window.game.timerPaused = true; }
    document.getElementById('tutorial-overlay').style.display = 'flex';
    this.render();
  }
  hide() {
    document.getElementById('tutorial-overlay').style.display = 'none';
    if(window.game && window.game.timerPaused && window.game.timeLeft > 0) {
      window.game.timerPaused = false;
      window.game.timerInterval = setInterval(()=>{ window.game.timeLeft--; window.game.updateTimerUI(); if(window.game.timeLeft<=0){window.game.stopTimer();window.game.onTimeout();} },1000);
    }
  }
  render() {
    const l = L(); const s = this.steps[this.step];
    const pct = ((this.step+1)/this.total*100).toFixed(1);
    document.getElementById('tut-prog').style.width = pct+'%';
    document.getElementById('tut-num').textContent = this.step+1;
    document.getElementById('tut-title').textContent = s.title;
    document.getElementById('tut-visual').innerHTML = s.visual;
    document.getElementById('tut-desc').textContent = s.desc;
    document.getElementById('tut-tip').innerHTML = s.tip;
    document.getElementById('tut-prev').style.opacity = this.step===0?'0':'1';
    document.getElementById('tut-prev').style.pointerEvents = this.step===0?'none':'auto';
    document.getElementById('tut-prev').textContent = l.tutPrev;
    const nb = document.getElementById('tut-next');
    nb.textContent = this.step===this.total-1 ? l.tutPlay : l.tutNext;
    const dots = document.getElementById('tut-dots'); dots.innerHTML='';
    this.steps.forEach((_,i)=>{ const d=document.createElement('div'); d.className='tut-dot'+(i===this.step?' active':''); dots.appendChild(d); });
  }
  next() { if(this.step<this.total-1){this.step++;this.render();}else{this.hide();} }
  prev() { if(this.step>0){this.step--;this.render();} }
}
window.tut = new Tutorial();

function cubePreviewSVG(size,type,colors){
  const W=56,H=50,rows=Math.min(size,3),cw=14;
  const fTop=type==='mirror'?'#ccc':colors[0];
  const fRight=type==='mirror'?'#999':colors[1];
  const fLeft=type==='mirror'?'#bbb':colors[2];
  const ox=W/2,oy=8;
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let r=0;r<rows;r++)for(let c=0;c<rows;c++){
    const px=ox+(c-r)*cw,py=oy+(c+r)*cw*0.5;
    svg+=`<polygon points="${px},${py} ${px+cw},${py+cw*.5} ${px},${py+cw} ${px-cw},${py+cw*.5}" fill="${fTop}" stroke="rgba(0,0,0,.2)" stroke-width="1"/>`;
    svg+=`<polygon points="${px+cw},${py+cw*.5} ${px+cw},${py+cw*1.5} ${px},${py+cw*2} ${px},${py+cw}" fill="${fRight}" stroke="rgba(0,0,0,.2)" stroke-width="1"/>`;
    svg+=`<polygon points="${px},${py+cw} ${px},${py+cw*2} ${px-cw},${py+cw*1.5} ${px-cw},${py+cw*.5}" fill="${fLeft}" stroke="rgba(0,0,0,.2)" stroke-width="1"/>`;
  }
  return svg+'</svg>';
}

class SoundFX{
  constructor(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  play(f,t,d){if(!this.ctx)return;if(this.ctx.state==='suspended')this.ctx.resume();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t;o.frequency.setValueAtTime(f,this.ctx.currentTime);g.gain.setValueAtTime(.07,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);}
  click(){this.play(380,'sine',.09);}
  swipe(){this.play(440,'sine',.07);}
  win(){[523,659,783,1046].forEach((f,i)=>setTimeout(()=>this.play(f,'square',.2),i*110));}
  timeout(){[400,300,200].forEach((f,i)=>setTimeout(()=>this.play(f,'sawtooth',.3),i*150));}
}

class Kack3D {
  constructor(){
    this.pivot=document.getElementById('pivot');

    this.tutorialSeen=localStorage.getItem('kack_tut_seen')==='1';

    document.getElementById('btn-next').onclick=()=>{
      document.getElementById('win-overlay').style.display='none';

  // ── MENU ──
  renderMenu(){
    document.getElementById('level-menu').style.display='flex';

    document.getElementById('btn-tut').style.display='none';
    this.stopTimer();

      const locked=lvl.id>this.unlockedLevels,done=this.completedLevels[lvl.id];

      card.className=`lvl-card theme-${i} ${locked?'locked':''} ${done?'completed':''}`;
      const [t1,t2,t3]=lvl.times.map(t=>`${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}`);
      const pc=LEVEL_COLORS[i]||['#fdd835','#e63946','#2196f3'];
      const rec=this.records[lvl.id];
      const recHtml=rec?`<div class="record-badge">⚡ ${Math.floor(rec/60)}:${String(rec%60).padStart(2,'0')}</div>`:'';
      card.innerHTML=`<div class="cube-preview">${cubePreviewSVG(lvl.size,lvl.type,pc)}<div class="lock-icon">🔒</div></div><div class="lvl-name">${lvl.name}</div><div class="lvl-size">${lvl.size}×${lvl.size}</div><div class="lvl-times">${t1} · ${t2} · ${t3}</div>${recHtml}${done?'<div class="star-badge">⭐</div>':''}`;
      if(!locked)card.onclick=()=>this.startLevel(lvl);

    });
  }

  showMenu(){
    document.getElementById('win-overlay').style.display='none';
    document.getElementById('timeout-overlay').style.display='none';
    this.renderMenu();
  }

  // ── START ──
  startLevel(lvl){
    this.currentLevel=lvl;
    document.getElementById('level-menu').style.display='none';
    document.getElementById('win-overlay').style.display='none';
    document.getElementById('timeout-overlay').style.display='none';
    document.getElementById('level-indicator').innerText=`Fase ${lvl.id}: ${lvl.name}`;
    // botão tutorial só no nível 1
    document.getElementById('btn-tut').style.display = lvl.id===1 ? 'flex' : 'none';
    this.size=lvl.size;
    const px=lvl.size>=6?31:lvl.size===5?37:lvl.size===4?43:lvl.size===2?58:49;
    document.documentElement.style.setProperty('--cubie-size',px+'px');
    this.pivot.className='pivot '+(lvl.type==='mirror'?'m-mode':'c-mode');
    this.initCube(lvl.size);
    this.hintsLeft=MAX_HINTS;this.hintIndex=0;this.updateHintBtn();
    setTimeout(()=>{
      this.scramble(lvl.scramble);
      setTimeout(()=>{
        // mostra tutorial automaticamente só no nível 1 e primeiro acesso
        if(lvl.id===1 && !this.tutorialSeen){
          this.tutorialSeen=true;
          localStorage.setItem('kack_tut_seen','1');
          window.tut.step=0;
          window.tut.show();
        } else {
          this.startTimer(lvl.times[0]);
        }
      }, lvl.scramble*24+500);
    },300);
  }

  // ── CUBO ──
  initCube(size){
    this.pivot.innerHTML='';this.cubies=[];
    const off=(size-1)/2;
    for(let x=0;x<size;x++)for(let y=0;y<size;y++)for(let z=0;z<size;z++){
      const el=document.createElement('div');el.className='cubie';
      ['front','back','right','left','up','down'].forEach(f=>{
        const fe=document.createElement('div');fe.className=`face face--${f}`;el.appendChild(fe);
      });
      const lx=x-off,ly=y-off,lz=z-off;
      this.applyTransform(el,lx,ly,lz);
      this.cubies.push({el,x:lx,y:ly,z:lz,rot:{x:0,y:0,z:0}});
      this.pivot.appendChild(el);
    }
  }

  applyTransform(el,x,y,z,r={x:0,y:0,z:0}){
    const s=parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cubie-size')),d=s+2;
    el.style.transform=`translate3d(${x*d}px,${-y*d}px,${z*d}px) rotateX(${r.x}deg) rotateY(${r.y}deg) rotateZ(${r.z}deg)`;
  }

  moveCam(dx,dy){
    this.rotY+=dx*11;this.rotX-=dy*11;
    this.rotX=Math.max(-88,Math.min(88,this.rotX));
    this.pivot.style.transform=`rotateX(${this.rotX}deg) rotateY(${this.rotY}deg)`;
  }

  rotate(face,dir,instant=false){
    if(this.isAnimating&&!instant)return;
    if(!instant)this.sfx.click();
    const lim=(this.size-1)/2;let axis,layer;
    switch(face){
      case'R':axis='x';layer=lim;dir*=-1;break;
      case'L':axis='x';layer=-lim;break;
      case'U':axis='y';layer=lim;break;
      case'D':axis='y';layer=-lim;dir*=-1;break;
      case'F':axis='z';layer=lim;break;
      case'B':axis='z';layer=-lim;dir*=-1;break;
    }
    this.rotateLayer(axis,layer,dir,instant);
  }

  rotateLayer(axis,layerVal,dir,instant=false){
    if(!instant)this.isAnimating=true;
    const active=this.cubies.filter(c=>Math.abs(c[axis]-layerVal)<0.1);
    active.forEach(c=>{
      if(!instant)setTimeout(()=>{this.applyMath(c,axis,dir);this.applyTransform(c.el,c.x,c.y,c.z,c.rot);},10);
      else{this.applyMath(c,axis,dir);this.applyTransform(c.el,c.x,c.y,c.z,c.rot);}
    });
    if(!instant)setTimeout(()=>this.isAnimating=false,230);
  }

  applyMath(c,axis,dir){
    const a=dir*90;
    if(axis==='z'){const ox=c.x;c.x=-c.y*dir;c.y=ox*dir;c.rot.z+=a;}
    if(axis==='y'){const ox=c.x;c.x=c.z*dir;c.z=-ox*dir;c.rot.y+=a;}
    if(axis==='x'){const oy=c.y;c.y=-c.z*dir;c.z=oy*dir;c.rot.x-=a;}
  }

  scramble(count=20){
    this.cubies.forEach(c=>c.el.classList.add('instant'));
    const faces=['R','L','U','D','F','B'];let i=0;
    const next=()=>{
      if(i>=count){setTimeout(()=>this.cubies.forEach(c=>c.el.classList.remove('instant')),50);return;}
      this.rotate(faces[Math.floor(Math.random()*6)],Math.random()>.5?1:-1,true);
      i++;setTimeout(next,22);
    };
    next();
  }

  // ── GESTOS DIRETOS NA FACE ──
  setupGestures(){
    const scene=document.getElementById('game-scene');
    let gStart=null, gMoved=false;
    const MIN_SWIPE=28;

    const getPos=e=>e.touches?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};

    const onStart=e=>{
      // só ativa gesto se não tocou nos controles
      gStart=getPos(e);gMoved=false;
    };
    const onMove=e=>{
      if(!gStart||gMoved)return;
      const p=getPos(e);
      const dx=p.x-gStart.x, dy=p.y-gStart.y;
      if(Math.sqrt(dx*dx+dy*dy)<MIN_SWIPE)return;
      gMoved=true;
      this.interpretSwipe(dx,dy);
      gStart=null;
    };
    const onEnd=()=>{gStart=null;};

    scene.addEventListener('touchstart',onStart,{passive:true});
    scene.addEventListener('touchmove',onMove,{passive:true});
    scene.addEventListener('touchend',onEnd,{passive:true});
    scene.addEventListener('mousedown',onStart);
    scene.addEventListener('mousemove',onMove);
    scene.addEventListener('mouseup',onEnd);
  }

  interpretSwipe(dx,dy){
    if(this.isAnimating)return;
    // Detecta direção dominante e mapeia para movimento de face
    const absDx=Math.abs(dx), absDy=Math.abs(dy);
    const isHoriz=absDx>absDy;
    // Usa ângulo da câmera para escolher face mais intuitiva
    const ry=((this.rotY%360)+360)%360;
    if(isHoriz){
      // arrastar horizontalmente → gira face U ou D
      const dir=dx>0?1:-1;
      this.rotate('U',dir);
      this.sfx.swipe();
      this.showGestureArrow(dx,dy);
    } else {
      // arrastar verticalmente → gira face R ou F dependendo da vista
      const dir=dy>0?-1:1;
      if(ry>45&&ry<225) this.rotate('R',dir);
      else this.rotate('F',dir);
      this.sfx.swipe();
      this.showGestureArrow(dx,dy);
    }
  }

  showGestureArrow(dx,dy){
    const el=document.getElementById('gesture-arrow');
    const scene=document.getElementById('game-scene');
    const r=scene.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const len=44, angle=Math.atan2(dy,dx);
    const color='rgba(124,58,237,0.92)';
    el.innerHTML=`<svg width="60" height="60" viewBox="0 0 60 60" class="arrow-svg arrow-anim">
      <defs><marker id="ga" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="${color}"/></marker></defs>
      <line x1="10" y1="30" x2="50" y2="30" stroke="${color}" stroke-width="4" marker-end="url(#ga)" stroke-linecap="round"/>
    </svg>`;
    el.style.cssText=`display:block;position:absolute;left:${cx-30}px;top:${cy-30}px;transform:rotate(${angle}rad);pointer-events:none;z-index:30;`;
    clearTimeout(this._arrowTimer);
    this._arrowTimer=setTimeout(()=>el.style.display='none',700);
  }

  // ── CÂMERA (botões) ──
  setupInputs(){
    // câmera pelos botões já está nos onclick do HTML
    // aqui apenas prevenimos conflito toque/câmera
  }

  // ── TIMER ──
  startTimer(s){
    this.stopTimer();this.timeLeft=s;this.totalTime=s;
    document.getElementById('timer-wrap').style.display='flex';
    this.updateTimerUI();
    this.timerInterval=setInterval(()=>{
      this.timeLeft--;this.updateTimerUI();
      if(this.timeLeft<=0){this.stopTimer();this.onTimeout();}
    },1000);
  }
  stopTimer(){if(this.timerInterval){clearInterval(this.timerInterval);this.timerInterval=null;}}
  updateTimerUI(){
    const m=Math.floor(this.timeLeft/60),s=this.timeLeft%60;
    document.getElementById('timer-display').textContent=`${m}:${String(s).padStart(2,'0')}`;
    document.getElementById('timer-bar-fill').style.width=Math.max(0,(this.timeLeft/this.totalTime)*100)+'%';
    document.getElementById('timer-wrap').classList.toggle('timer-warn',this.timeLeft<=30);
  }
  onTimeout(){this.sfx.timeout();document.getElementById('timeout-overlay').style.display='flex';}

  // ── DICAS ──
  updateHintBtn(){
    const el=document.getElementById('hint-count'),btn=document.getElementById('btn-hint');
    if(el)el.textContent=this.hintsLeft;
    if(btn){btn.style.opacity=this.hintsLeft>0?'1':'0.4';btn.style.pointerEvents=this.hintsLeft>0?'auto':'none';}
  }

  showHint(){
    if(this.hintsLeft<=0||!this.currentLevel)return;
    const lvlHints=getHints(this.currentLevel.id);
    const hint=lvlHints[this.hintIndex%lvlHints.length];
    this.hintIndex++;this.hintsLeft--;this.updateHintBtn();
    this.sfx.play(520,'sine',.15);
    document.getElementById('hint-move').textContent=hint.move;
    document.getElementById('hint-desc').textContent=hint.desc;
    const l=this.hintsLeft;
    document.getElementById('hint-uses-msg').textContent=l>0?L().hintLeft(l):L().hintLast;
    document.querySelector('.hint-title').textContent=L().hintTitle;
    document.getElementById('hint-panel').style.display='block';
    if(this.timerInterval){clearInterval(this.timerInterval);this.timerPaused=true;}
  }

  closeHint(){
    document.getElementById('hint-panel').style.display='none';
    if(this.timerPaused&&this.timeLeft>0){
      this.timerPaused=false;
      this.timerInterval=setInterval(()=>{this.timeLeft--;this.updateTimerUI();if(this.timeLeft<=0){this.stopTimer();this.onTimeout();}},1000);
    }
  }

  // ── VERIFICAÇÃO REAL DO CUBO ──
  isSolved(){
    // Cada cubie deve ter rotação múltipla de 360° em todos os eixos
    // e estar na posição original (x,y,z inteiros e sem rotação residual)
    const EPS = 0.15;
    for(const c of this.cubies){
      const rx = ((c.rot.x % 360) + 360) % 360;
      const ry = ((c.rot.y % 360) + 360) % 360;
      const rz = ((c.rot.z % 360) + 360) % 360;
      const okX = rx < EPS*90 || rx > 360 - EPS*90;
      const okY = ry < EPS*90 || ry > 360 - EPS*90;
      const okZ = rz < EPS*90 || rz > 360 - EPS*90;
      if(!okX || !okY || !okZ) return false;
    }
    // Verifica se cada face tem cor uniforme comparando rotações acumuladas
    // Agrupamos cubies por face visível e checamos se o rot acumulado é 0
    const tol = 5; // graus
    const faceGroups = {
      U: this.cubies.filter(c => Math.abs(c.y - (this.size-1)/2) < 0.1),
      D: this.cubies.filter(c => Math.abs(c.y + (this.size-1)/2) < 0.1),
      F: this.cubies.filter(c => Math.abs(c.z - (this.size-1)/2) < 0.1),
      B: this.cubies.filter(c => Math.abs(c.z + (this.size-1)/2) < 0.1),
      R: this.cubies.filter(c => Math.abs(c.x - (this.size-1)/2) < 0.1),
      L: this.cubies.filter(c => Math.abs(c.x + (this.size-1)/2) < 0.1),
    };
    for(const face of Object.values(faceGroups)){
      if(face.length === 0) continue;
      const base = { x: ((face[0].rot.x%360)+360)%360, y: ((face[0].rot.y%360)+360)%360, z: ((face[0].rot.z%360)+360)%360 };
      for(const c of face){
        const cx=((c.rot.x%360)+360)%360, cy=((c.rot.y%360)+360)%360, cz=((c.rot.z%360)+360)%360;
        const diffX=Math.min(Math.abs(cx-base.x),360-Math.abs(cx-base.x));
        const diffY=Math.min(Math.abs(cy-base.y),360-Math.abs(cy-base.y));
        const diffZ=Math.min(Math.abs(cz-base.z),360-Math.abs(cz-base.z));
        if(diffX>tol||diffY>tol||diffZ>tol) return false;
      }
    }
    return true;
  }

  showNotSolved(){
    // Feedback visual + sonoro de "ainda não"
    this.sfx.play(220,'sawtooth',.18);
    const pivot=this.pivot;
    pivot.style.transition='transform .07s';
    const base=`rotateX(${this.rotX}deg) rotateY(${this.rotY}deg)`;
    let i=0;
    const shake=()=>{
      if(i>=6){pivot.style.transform=base;return;}
      const off=i%2===0?3:-3;
      pivot.style.transform=`rotateX(${this.rotX}deg) rotateY(${this.rotY+off}deg)`;
      i++;setTimeout(shake,55);
    };
    shake();
    // Mini toast "Ainda não! Continue tentando 💪"
    let toast=document.getElementById('not-solved-toast');
    if(!toast){
      toast=document.createElement('div');
      toast.id='not-solved-toast';
      toast.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.92);color:#fff;padding:10px 20px;border-radius:30px;font-size:.82rem;font-weight:700;z-index:400;pointer-events:none;transition:opacity .3s;white-space:nowrap;';
      document.body.appendChild(toast);
    }
    toast.textContent=L().notSolved;
    toast.style.opacity='1';
    clearTimeout(this._toastTimer);
    this._toastTimer=setTimeout(()=>toast.style.opacity='0',2200);
  }

  // ── CONFETE ──
  launchConfete(){
    const canvas=document.getElementById('confete-canvas');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
    const cores=['#7c3aed','#2196f3','#e63946','#fdd835','#43a047','#f4a261','#f59e0b','#ec4899'];
    const particulas=Array.from({length:140},()=>({
      x:Math.random()*canvas.width,
      y:-10-Math.random()*200,
      r:Math.random()*6+3,
      cor:cores[Math.floor(Math.random()*cores.length)],
      vx:(Math.random()-0.5)*4,
      vy:Math.random()*4+2,
      rot:Math.random()*360,
      vrot:(Math.random()-0.5)*8,
      forma:Math.floor(Math.random()*3)
    }));
    let frame=0;
    const MAX_FRAMES=180;
    const animar=()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particulas.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.vy+=0.06;
        if(p.y>canvas.height+20)return;
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle=p.cor;
        ctx.globalAlpha=Math.max(0,1-(frame/MAX_FRAMES));
        if(p.forma===0){ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}
        else if(p.forma===1){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}
        else{ctx.beginPath();ctx.moveTo(0,-p.r);ctx.lineTo(p.r,p.r);ctx.lineTo(-p.r,p.r);ctx.closePath();ctx.fill();}
        ctx.restore();
      });
      frame++;
      if(frame<MAX_FRAMES) requestAnimationFrame(animar);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    };
    animar();
  }

  // ── VITÓRIA ──
  checkWin(){
    if(!this.currentLevel) return;
    if(!this.isSolved()){
      this.showNotSolved();
      return;
    }
    this.stopTimer();
    this.sfx.win();
    this.launchConfete();
    const lvl=this.currentLevel;
    const used=this.totalTime-this.timeLeft;
    // Salvar recorde
    const recAnterior=this.records[lvl.id];
    const novoRecorde=!recAnterior||used<recAnterior;
    if(novoRecorde){
      this.records[lvl.id]=used;
      localStorage.setItem('kack_records',JSON.stringify(this.records));
    }
    this.completedLevels[lvl.id]=true;
    localStorage.setItem('kack_completed',JSON.stringify(this.completedLevels));
    if(lvl.id>=this.unlockedLevels){this.unlockedLevels=lvl.id+1;localStorage.setItem('kack_unlocked',this.unlockedLevels);}
    const m=Math.floor(used/60),s=used%60;
    const temProx=!!LEVELS.find(l=>l.id===lvl.id+1);
    document.getElementById('win-msg').textContent=`${L().winTitle} ${m}:${String(s).padStart(2,'0')}${temProx?' — '+L().winNextUnlocked:''}`;
    // Badge novo recorde
    const badge=document.getElementById('win-record-badge');
    badge.style.display=novoRecorde?'inline-block':'none';
    document.getElementById('btn-next').style.display=temProx?'inline-flex':'none';
    document.getElementById('win-overlay').style.display='flex';
  }
}

function initSplash() {
  // Definir ícone PWA
  const iconB64 = SPLASH_IMAGES._icon;
  const pwai = document.getElementById('pwa-icon');
  const pwaf = document.getElementById('pwa-favicon');
  if(pwai && iconB64) pwai.href = iconB64;
  if(pwaf && iconB64) pwaf.href = iconB64;
  const img = document.getElementById('splash-img');
  const lang = localStorage.getItem('kack_lang') || 'en';
  if(img && SPLASH_IMAGES[lang]) img.src = SPLASH_IMAGES[lang];
  setTimeout(() => {
    const splash = document.getElementById('splash-screen');
    if(splash) {
      splash.classList.add('fade-out');
      setTimeout(() => splash.remove(), 650);
    }
  }, 2200);
}
initSplash();

window.game = new Kack3D();
// Aplicar idioma salvo na inicialização
applyLang();

// ── PWA SERVICE WORKER ──
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='kack3d-v1';
    self.addEventListener('install',e=>e.waitUntil(
      caches.open(CACHE).then(c=>c.add('/'))
    ));
    self.addEventListener('fetch',e=>e.respondWith(
      caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
        const clone=res.clone();
        caches.open(CACHE).then(c=>c.put(e.request,clone));
        return res;
      }))
    ));
  `;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
